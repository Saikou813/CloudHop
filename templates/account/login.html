{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h2 class="fw-bold text-primary text-center mb-4">Welcome Back! ☁️</h2>
                
                <form class="login" method="POST" action="{% url 'account_login' %}">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button class="btn btn-primary btn-lg rounded-pill" type="submit">Sign In</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted small">New to CloudHop? <a href="{% url 'account_signup' %}" class="text-primary text-decoration-none fw-bold">Join now</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
