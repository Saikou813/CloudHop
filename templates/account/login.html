{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow p-4 border-0 rounded-4 mt-5">
            <h2 class="fw-bold text-primary mb-4 text-center">Login to CloudHop</h2>
            <form method="POST" action="{% url 'account_login' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-primary btn-lg" type="submit">Sign In</button>
                </div>
            </form>
            <p class="mt-3 text-center">New here? <a href="{% url 'account_signup' %}">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
