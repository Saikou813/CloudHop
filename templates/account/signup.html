{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h2 class="fw-bold text-primary text-center mb-4">Join CloudHop ✈️</h2>
                
                <form class="signup" id="signup_form" method="post" action="{% url 'account_signup' %}">
                    {% csrf_token %}
                    
                    <!-- This "allauth-form" div forces labels above inputs -->
                    <div class="allauth-form-container">
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-muted">{{ field.label }}</label>
                                <!-- We "slap" the Bootstrap class onto the field widget -->
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small">{{ field.errors }}</div>
                                {% endif %}
                                {% if field.help_text %}
                                    <div class="form-text small">{{ field.help_text|safe }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-primary btn-lg rounded-pill" type="submit">Create Account</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
