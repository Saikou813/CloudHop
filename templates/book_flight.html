{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h2 class="fw-bold text-primary mb-4">Book Flight to {{ flight.destination }}</h2>
                <p class="text-muted">Flight Number: <strong>{{ flight.flight_number }}</strong></p>
                <p class="text-muted">Price: <strong>${{ flight.price }}</strong></p>
                <hr>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Confirm Booking</button>
                        <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
