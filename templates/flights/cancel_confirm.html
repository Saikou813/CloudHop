{% extends 'flights/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow border-danger">
            <div class="card-body p-5">
                <h2 class="text-danger fw-bold mb-4">Cancel Booking? ⚠️</h2>
                <p class="lead">Are you sure you want to cancel your journey to <strong>{{ booking.flight.destination }}</strong>?</p>
                <p class="text-muted small mb-4">Flight Number: {{ booking.flight.flight_number }}</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">Yes, Cancel Booking</button>
                        <a href="{% url 'my_bookings' %}" class="btn btn-outline-secondary">No, Keep It</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
