{% extends 'flights/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h2 class="fw-bold text-primary mb-4">My Travel Profile 👤</h2>
                <p class="text-muted small">Update your details for faster booking.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" class="form-control bg-light" value="{{ user.username }}" readonly>
                    </div>
                    {{ form.as_p }}
                    <div class="d-grid gap-2 mt-4">
                        <button class="btn btn-primary btn-lg rounded-pill" type="submit">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
