{% extends 'flights/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-4 mt-5">
            <div class="card-body p-5">
                <h2 class="fw-bold text-primary mb-4 text-center">Contact CloudHop Support 🎧</h2>
                <p class="text-center text-muted mb-4">Have a question about your flight? Drop us a message.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Send Message</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
