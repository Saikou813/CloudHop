<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudHop | Modern Flight Booking</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
        <!-- Shows the current user -->
        <span class="nav-link text-white me-2">Hi, {{ user.username }}!</span>
        <a class="nav-item nav-link text-white" href="{% url 'my_bookings' %}">My Bookings</a>

        <!-- Secure Logout Form (Required by Allauth) -->
        <form method="post" action="{% url 'account_logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-link nav-link text-white border-0 py-0"
                style="display:inline; vertical-align:baseline;">Logout</button>
        </form>
        {% else %}
        <!-- Shows for guest users -->
        <a class="nav-item nav-link text-white" href="{% url 'account_login' %}">Login</a>
        <a class="nav-item nav-link text-white" href="{% url 'account_signup' %}">Register</a>
        {% endif %}
    </div>

    <main class="container my-5">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-4 border-top">
        <p>&copy; 2026 CloudHop. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net"></script>
</body>

</html>
